<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study With Me - Studyhub</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        /* --- Welcome Screen --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease, visibility 1s;
        }
        #intro-screen h1 {
            color: #333;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            animation: fadeInOut 2.5s ease-in-out;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            30% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        /* --- Main Background --- */
        body {
            background-image: url('https://static1.squarespace.com/static/5fe4caeadae61a2f19719512/t/6696219ad6dcda40f9fa8ab6/1721115042117/16.gif?format=1500w');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        /* --- Real Time Display --- */
        .real-time {
            position: fixed;
            top: 30px;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* --- Center Pomodoro Timer --- */
        .timer-container {
            text-align: center;
            transform: translateY(-20px);
        }
        .big-timer {
            font-size: 10rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 5px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.6);
            margin-bottom: 10px;
        }
        
        .timer-input-box {
            margin-bottom: 20px;
        }
        .timer-input-box input {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255,255,255,0.4);
            backdrop-filter: blur(5px);
            color: #fff;
            width: 100px;
            padding: 8px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2rem;
            outline: none;
        }
        .timer-input-box input::placeholder { color: rgba(255,255,255,0.6); }

        .timer-main-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .timer-main-controls button {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border: none;
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .timer-main-controls button:hover {
            transform: scale(1.05) translateY(-3px);
            background: #ffcc00;
        }

        /* --- Bottom Icons Area --- */
        .bottom-bar {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 25px;
            z-index: 100;
        }

        .icon-btn {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            color: #fff;
            transition: all 0.3s;
        }
        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            transform: scale(1.1);
        }
        .icon-btn svg { width: 26px; height: 26px; stroke: currentColor; fill: none; stroke-width: 2;}

        /* --- Panels --- */
        .panel {
            position: fixed;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 90;
        }
        .panel.active { opacity: 1; visibility: visible; }
        .panel h3 { margin-bottom: 15px; font-size: 1.2rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; color: #fff;}

        /* Sound Panel */
        #sound-panel {
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            width: 320px;
        }
        #sound-panel.active { transform: translateX(-50%) translateY(0); }
        .sound-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; color: #fff; }
        .sound-item span { flex: 1; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .sound-item button { background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
        .sound-item input[type="range"] { width: 70px; accent-color: #ffcc00; }

        /* Calendar Panel */
        #todo-panel {
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 850px; max-width: 95vw;
            background: #fff;
            color: #333;
            padding: 30px;
        }
        #todo-panel.active { transform: translate(-50%, -50%) scale(1); }
        
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: #eee;
            border: 1px solid #eee;
        }
        .calendar-day-head { background: #f8f9fa; padding: 10px; text-align: center; font-weight: 600; font-size: 0.8rem; }
        .calendar-day {
            background: #fff;
            min-height: 100px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: 0.2s;
        }
        .calendar-day:hover { background: #fffdeb; }
        .calendar-day.today { background: #fff4cc; }
        .day-number { font-size: 0.9rem; font-weight: 600; margin-bottom: 5px; }
        .day-content { font-size: 0.7rem; overflow-y: auto; flex: 1; }
        .task-dot { background: #ffcc00; margin-bottom: 2px; padding: 2px 4px; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Task Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            color: #333;
        }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { flex: 1; padding: 8px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h1>Welcome to studyhub</h1>
    </div>

    <div class="bg-overlay"></div>
    <div class="real-time" id="real-time">00:00:00</div>

    <!-- <audio id="rain" loop src="https://assets.mixkit.co/active_storage/sfx/2505/2505-preview.mp3"></audio>
    <audio id="cafe" loop src="https://www.soundjay.com/misc/sounds/coffee-shop-1.mp3"></audio>
    <audio id="fireplace" loop src="https://www.soundjay.com/nature/sounds/fire-1.mp3"></audio>
    <audio id="night" loop src="https://www.soundjay.com/nature/sounds/crickets-chirping-01.mp3"></audio>
    <audio id="city" loop src="https://www.soundjay.com/misc/sounds/street-city-ambience-01.mp3"></audio>
    <audio id="beep-sound" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3"></audio> -->

    <audio id="rain" loop src="./sounds/rain.mp3"></audio>
    <audio id="cafe" loop src="./sounds/cafe.mp3"></audio>
    <audio id="fireplace" loop src="./sounds/fireplace.mp3"></audio>
    <audio id="night" loop src="./sounds/night.mp3"></audio>
    <audio id="city" loop src="./sounds/city.mp3"></audio>
    <audio id="beep-sound" src="./sounds/alert.mp3"></audio>

    <div class="timer-container">
        <div id="time" class="big-timer">00:00</div>
        
        <div class="timer-input-box">
            <input type="number" id="manualMinutes" placeholder="นาที" onchange="setTimerManual()">
        </div>

        <div class="timer-main-controls">
            <button onclick="startTimer()">Start</button>
            <button onclick="pauseTimer()">Pause</button>
            <button onclick="finishTimer()">Finish</button>
        </div>
    </div>

    <div id="sound-panel" class="panel">
        <h3>ตั้งค่าเสียง</h3>
        <div class="sound-item">
            <span>🌧️ ฝนตก</span>
            <button onclick="toggleSound('rain', this)">Play</button>
            <input type="range" min="0" max="1" step="0.1" value="0.5" onchange="setVolume('rain', this.value)">
        </div>
        <div class="sound-item">
            <span>🔥 เตาผิง</span>
            <button onclick="toggleSound('fireplace', this)">Play</button>
            <input type="range" min="0" max="1" step="0.1" value="0.5" onchange="setVolume('fireplace', this.value)">
        </div>
        <div class="sound-item">
            <span>☕ ร้านกาแฟ</span>
            <button onclick="toggleSound('cafe', this)">Play</button>
            <input type="range" min="0" max="1" step="0.1" value="0.5" onchange="setVolume('cafe', this.value)">
        </div>
        <div class="sound-item">
            <span>🌙 ตอนดึก</span>
            <button onclick="toggleSound('night', this)">Play</button>
            <input type="range" min="0" max="1" step="0.1" value="0.5" onchange="setVolume('night', this.value)">
        </div>
        <div class="sound-item">
            <span>🏙️ เมือง</span>
            <button onclick="toggleSound('city', this)">Play</button>
            <input type="range" min="0" max="1" step="0.1" value="0.5" onchange="setVolume('city', this.value)">
        </div>
    </div>

    <div id="todo-panel" class="panel">
        <div class="calendar-header">
            <button onclick="prevMonth()"><</button>
            <h2 id="monthDisplay">Month Year</h2>
            <button onclick="nextMonth()">></button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h4 id="modalDate">วันที่</h4>
            <input type="text" id="modalTaskInput" placeholder="เพิ่มงานที่ต้องทำ...">
            <div id="modalTaskList" style="max-height: 100px; overflow-y: auto; margin-bottom: 10px; font-size: 0.8rem;"></div>
            <div class="modal-btns">
                <button style="background: #ffcc00;" onclick="saveTask()">เพิ่ม</button>
                <button style="background: #eee;" onclick="closeModal()">ปิด</button>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="icon-btn" onclick="togglePanel('todo-panel')" title="ปฏิทิน">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        </button>

        <button class="icon-btn" onclick="togglePanel('sound-panel')" title="เสียงบรรยากาศ">
            <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        </button>
    </div>

    <script>
        // --- 1. Real Time Clock ---
        function updateClock() {
            const now = new Date();
            document.getElementById('real-time').textContent = now.toLocaleTimeString('th-TH');
        }
        setInterval(updateClock, 1000);

        // --- 2. Timer Logic (Manual Input) ---
        let timeLeft = 0;
        let timerInterval;
        let isRunning = false;

        function updateDisplay() {
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            document.getElementById('time').textContent = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function setTimerManual() {
            const min = document.getElementById('manualMinutes').value;
            if(min > 0) {
                pauseTimer();
                timeLeft = min * 60;
                updateDisplay();
            }
        }

        function startTimer() {
            if (isRunning || timeLeft === 0) return;
            isRunning = true;
            timerInterval = setInterval(() => {
                if (timeLeft > 0) { timeLeft--; updateDisplay(); }
                else { 
                    clearInterval(timerInterval); 
                    isRunning = false;
                    document.getElementById('beep-sound').play();
                }
            }, 1000);
        }
        function pauseTimer() { clearInterval(timerInterval); isRunning = false; }
        function finishTimer() { pauseTimer(); timeLeft = 0; updateDisplay(); }

        // --- 3. Sound Logic ---
        function toggleSound(id, btn) {
            const audio = document.getElementById(id);
            if (!audio.src && !audio.querySelector('source')) {
                console.error("Error: ไม่พบไฟล์เสียงในแท็ก audio นี้");
                return;
            };

            if (audio.paused) { 
                // ใช้ promise เพื่อดักจับ error ตอนเล่น
                audio.play().then(() => {
                    btn.textContent = 'Pause'; 
                    btn.style.background = '#ffcc00'; 
                    btn.style.color = '#333';
                }).catch(error => {
                    console.log("Playback failed:", error);
                });
            } else { 
                audio.pause(); 
                btn.textContent = 'Play'; 
                btn.style.background = 'rgba(255,255,255,0.2)'; 
                btn.style.color = '#fff';
            }
        }
        function setVolume(id, vol) { document.getElementById(id).volume = vol; }

        // --- 4. Calendar Logic ---
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let selectedDateStr = "";
        let tasks = JSON.parse(localStorage.getItem('studyCalendarTasks')) || {};

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthDisplay = document.getElementById('monthDisplay');
            grid.innerHTML = '';
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            
            monthDisplay.textContent = `${monthNames[currentMonth]} ${currentYear}`;

            const days = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];
            days.forEach(d => {
                const head = document.createElement('div');
                head.className = 'calendar-day-head';
                head.textContent = d;
                grid.appendChild(head);
            });

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day';
                grid.appendChild(empty);
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'calendar-day';
                const dateKey = `${currentYear}-${currentMonth + 1}-${d}`;
                
                if(new Date().toDateString() === new Date(currentYear, currentMonth, d).toDateString()) dayEl.classList.add('today');

                dayEl.innerHTML = `<div class="day-number">${d}</div><div class="day-content"></div>`;
                const content = dayEl.querySelector('.day-content');
                
                if(tasks[dateKey]) {
                    tasks[dateKey].forEach(t => {
                        const dot = document.createElement('div');
                        dot.className = 'task-dot';
                        dot.textContent = t;
                        content.appendChild(dot);
                    });
                }
                

                dayEl.onclick = () => openModal(dateKey);
                grid.appendChild(dayEl);
            }
        }

        function openModal(date) {
            selectedDateStr = date;
            document.getElementById('modalDate').textContent = date;
            document.getElementById('taskModal').style.display = 'flex';
            updateModalTaskList();
        }

        function saveTask() {
            const val = document.getElementById('modalTaskInput').value.trim();
            if(val) {
                if(!tasks[selectedDateStr]) tasks[selectedDateStr] = [];
                tasks[selectedDateStr].push(val);
                localStorage.setItem('studyCalendarTasks', JSON.stringify(tasks));
                document.getElementById('modalTaskInput').value = '';
                updateModalTaskList();
                renderCalendar();
            }
        }

        function updateModalTaskList() {
            const list = document.getElementById('modalTaskList');
            list.innerHTML = ''; // ล้างรายการเก่าออก
            
            if (tasks[selectedDateStr] && tasks[selectedDateStr].length > 0) {
                tasks[selectedDateStr].forEach((t, i) => {
                    const taskItem = document.createElement('div');
                    taskItem.style.display = 'flex';
                    taskItem.style.justifyContent = 'space-between';
                    taskItem.style.alignItems = 'center';
                    taskItem.style.marginBottom = '5px';
                    taskItem.style.background = 'rgba(255,255,255,0.1)';
                    taskItem.style.padding = '5px 10px';
                    taskItem.style.borderRadius = '5px';

                    taskItem.innerHTML = `
                        <span>- ${t}</span>
                        <button onclick="deleteTask(${i})" style="background:#ff4444; color:white; border:none; border-radius:3px; padding:2px 8px; cursor:pointer; font-size:12px;">ลบ</button>
                    `;
                    list.appendChild(taskItem);
                });
            } else {
                list.innerHTML = '<div style="color:gray; font-size:14px;">ไม่มีงานสำหรับวันนี้</div>';
            }
        }

       function deleteTask(index) {
            if (confirm('คุณต้องการลบงานนี้ใช่หรือไม่?')) {
                // 1. ลบจาก Array
                tasks[selectedDateStr].splice(index, 1);
                
                // 2. ถ้าลบจนหมด ให้ลบ Key นั้นทิ้งไปเลย (สำคัญมาก)
                if (tasks[selectedDateStr].length === 0) {
                    delete tasks[selectedDateStr];
                }
                
                // 3. เซฟลง LocalStorage ทันที
                localStorage.setItem('studyCalendarTasks', JSON.stringify(tasks));
                
                // 4. อัปเดตหน้าจอ Modal และ **สั่งวาดปฏิทินใหม่**
                updateModalTaskList(); 
                renderCalendar(); // <--- บรรทัดนี้จะทำให้สีหรือจุดที่เคยมีหายไป
            }
        }

        function closeModal() { document.getElementById('taskModal').style.display = 'none'; }
        function prevMonth() { currentMonth--; if(currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar(); }
        function nextMonth() { currentMonth++; if(currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); }

        // --- Panel Toggle ---
        function togglePanel(id) {
            const panels = document.querySelectorAll('.panel');
            panels.forEach(p => { if(p.id !== id) p.classList.remove('active'); });
            document.getElementById(id).classList.toggle('active');
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('intro-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('intro-screen').style.display = 'none', 1000);
            }, 2000);
            renderCalendar();
            updateDisplay();
        });
    </script>
</body>
</html>
